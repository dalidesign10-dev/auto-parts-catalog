function normalizeBrand(brand) {
  if (!brand) return 'Unknown';
  let b = brand.trim();
  // Fix garbage brands from gryp3d scraping (e.g. "8/s-l500.jpg~Fiat")
  if (b.includes('~')) {
    const parts = b.split('~');
    b = parts[parts.length - 1].trim();
  }
  // Remove any remaining URL artifacts
  if (b.includes('s-l500') || b.includes('.jpg') || b.includes('.webp')) {
    // Try to extract last word after any separator
    const match = b.match(/[~\/]([A-Za-zÀ-ÿ][A-Za-zÀ-ÿ\s\-]+)$/);
    if (match) b = match[1].trim();
    else return 'Unknown';
  }
  // Look up canonical name (case-insensitive)
  const key = b.toLowerCase().trim();
  if (canonicalBrands[key]) return canonicalBrands[key];
  // If not found, capitalize first letter of each word
  return b.replace(/\b\w/g, c => c.toUpperCase());
}

// Normalize all product brands
products.forEach(p => { p.brand = normalizeBrand(p.brand); });

// Populate brand filter

brands.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; brandSelect.appendChild(o); });

  opt.textContent = t;

});

  let score = moroccoScores[p.brand] || 0;

  // If brand not found, try case-insensitive lookup
  if (score === 0 && p.brand && p.brand !== 'Unknown') {
    const bl = p.brand.toLowerCase();
    for (const [k,v] of Object.entries(moroccoScores)) {
      if (k.toLowerCase() === bl) { score = v; break; }
    }
  }

  // Add type bonus (capped at 100)
  const bonus = typeBonus[p.type] || 0;
  score = Math.min(100, score + bonus);

  // Popular models in Morocco get extra points
  const modelLower = (p.model || '').toLowerCase();
  const hotModels = ['logan','sandero','duster','clio','megane','symbol','208','308','2008','3008','partner','berlingo','c3','c4','c-elys','golf','polo','caddy','tucson','i10','i20','corsa','astra','fiesta','focus','transit','punto','doblo','yaris','hilux','sportage','picanto'];
  for (const hm of hotModels) {
    if (modelLower.includes(hm)) { score = Math.min(100, score + 5); break; }
  }

  return score;
}

// Pre-compute scores
products.forEach(p => { p._moroccoScore = getMoroccoScore(p); });

let moroccoMode = false;
const PAGE_SIZE = 60;
let filtered = [];
let shown = 0;

function buildCard(p) {
  const sideClass = (p.side === 'Izquierdo' || p.side === 'Left') ? 'side-izq' : (p.side === 'Derecho' || p.side === 'Right') ? 'side-der' : (p.side === 'Set') ? 'side-set' : '';
  const sourceClass = p.source === 'tirshop.ro' ? 'source-tirshop' : (p.source === 'eBay - odocar_shop' || p.source === 'eBay - mikryfrance' || p.source === 'eBay - gryp3d') ? 'source-ebay' : 'source-faros';
  const title = p.code ? `${p.type || 'Kit Reparacion Faro'} ${p.side} ${p.brand} ${p.model} [${p.code}]` : `${p.type || 'Kit Reparacion Faro'} ${p.side} ${p.brand} ${p.model}`;
  const piecesTag = p.pieces ? `<span class="tag">${p.pieces} piezas</span>` : '';
  const typeTag = p.type ? `<span class="tag type-tag">${p.type}</span>` : '';
  const priceDisplay = p.price.includes('\u20ac') ? p.price : p.price + ' &euro;';

  // Morocco score bar
  let moroccoBar = '';
  if (moroccoMode) {
    const s = p._moroccoScore;
    const cls = s >= 70 ? 'score-high' : s >= 40 ? 'score-med' : 'score-low';
    const label = s >= 90 ? '\u2b50 ' + s + '%' : s + '%';
    moroccoBar = `<div class="morocco-bar">
      <span style="font-size:11px;color:#666;">\ud83c\uddf2\ud83c\udde6</span>
      <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${s}%"></div></div>
      <span class="bar-label" style="color:${s>=70?'#2e7d32':s>=40?'#e65100':'#c62828'}">${label}</span>
    </div>`;
  }

  const isFullUrl = p.img && (p.img.startsWith('http://') || p.img.startsWith('https://'));
  const imgHtml = isFullUrl
    ? `<img src="${p.img}" alt="${p.brand} ${p.model}" loading="lazy" onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22><rect width=%22300%22 height=%22200%22 fill=%22%23f0f0f0%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2214%22>${p.brand} ${p.model}</text></svg>';">`
    : `<div style="width:100%;height:200px;background:linear-gradient(135deg,#e8e8e8,#f5f5f5);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#888;"><svg width='48' height='48' fill='none' stroke='#bbb' stroke-width='1.5' viewBox='0 0 24 24'><rect x='3' y='3' width='18' height='18' rx='2'/><circle cx='8.5' cy='8.5' r='1.5'/><path d='M21 15l-5-5L5 21'/></svg><span style="margin-top:8px;font-size:13px;font-weight:500">${p.brand} ${p.model}</span></div>`;

  return `<div class="card">
    ${imgHtml}
    <div class="card-body">
      <h3>${title}</h3>
      ${moroccoBar}
      <div class="meta">
        <span class="tag">${p.brand}</span>
        <span class="tag ${sideClass}">${p.side}</span>
        ${piecesTag}
        <span class="tag">${p.year}</span>
        <span class="tag ${sourceClass}">${p.source}</span>
        ${typeTag}
      </div>
      <div class="price">${priceDisplay}</div>
      <a href="${p.url}" target="_blank">View on ${p.source}</a>
    </div>
  </div>`;
}

function showMore() {
  const grid = document.getElementById('grid');
  const batch = filtered.slice(shown, shown + PAGE_SIZE);
  let html = '';
  batch.forEach(p => { html += buildCard(p); });
  grid.insertAdjacentHTML('beforeend', html);
  shown += batch.length;
  const wrap = document.getElementById('loadMoreWrap');
  const countEl = document.getElementById('showCount');
  if (shown < filtered.length) {
    wrap.style.display = 'block';
    countEl.textContent = `Showing ${shown} of ${filtered.length}`;
  } else {
    wrap.style.display = 'none';
  }
}

function render() {
  const brand = document.getElementById('filterBrand').value;
  const source = document.getElementById('filterSource').value;
  const type = document.getElementById('typeFilter').value;
  const side = document.getElementById('filterSide').value;
  const search = document.getElementById('searchBox').value.toLowerCase();
  const moroccoSortVal = document.getElementById('moroccoSort').value;

  filtered = products.filter(p => {
    if (brand && p.brand !== brand) return false;
    if (source && p.source !== source) return false;
    if (type && p.type !== type) return false;
    if (side === 'Left/Izquierdo' && p.side !== 'Left' && p.side !== 'Izquierdo') return false;
    if (side === 'Right/Derecho' && p.side !== 'Right' && p.side !== 'Derecho') return false;
    if (side === 'Both' && p.side !== 'Both') return false;
    if (side === 'Set' && p.side !== 'Set') return false;
    if (search && !(p.brand+' '+p.model+' '+p.year+' '+(p.source||'')+' '+(p.code||'')+' '+(p.type||'')).toLowerCase().includes(search)) return false;
    // Morocco minimum score filter
    if (moroccoMode) {
      if (moroccoSortVal === 'score50' && p._moroccoScore < 50) return false;
      if (moroccoSortVal === 'score70' && p._moroccoScore < 70) return false;
      if (moroccoSortVal === 'score90' && p._moroccoScore < 90) return false;
    }
    return true;
  });

  // Sort by Morocco score if in Morocco mode
  if (moroccoMode) {
    filtered.sort((a, b) => b._moroccoScore - a._moroccoScore);
  }

  // Update info bar
  const infoEl = document.getElementById('moroccoInfo');
  if (moroccoMode) {
    const avg = filtered.length ? Math.round(filtered.reduce((s,p) => s + p._moroccoScore, 0) / filtered.length) : 0;
    const high = filtered.filter(p => p._moroccoScore >= 70).length;
    infoEl.textContent = `\ud83c\uddf2\ud83c\udde6 Morocco Market: ${filtered.length} products | Avg score: ${avg}% | ${high} products with 70%+ market fit | Sorted by market relevance`;
    infoEl.classList.add('visible');
  } else {
    infoEl.classList.remove('visible');
  }

  shown = 0;
  document.getElementById('grid').innerHTML = '';
  document.getElementById('showCount').textContent = `${filtered.length} results`;
  showMore();
}

// Morocco toggle
document.getElementById('moroccoToggle').addEventListener('click', function() {
  moroccoMode = !moroccoMode;
  this.classList.toggle('active');
  this.innerHTML = moroccoMode
    ? '<span class="flag">\ud83c\uddf2\ud83c\udde6</span> Morocco ON'
    : '<span class="flag">\ud83c\uddf2\ud83c\udde6</span> Morocco Filter';
  document.getElementById('moroccoSort').classList.toggle('visible', moroccoMode);
  render();
});

document.getElementById('moroccoSort').addEventListener('change', render);
document.getElementById('loadMoreBtn').addEventListener('click', showMore);
document.getElementById('filterBrand').addEventListener('change', render);
document.getElementById('filterSource').addEventListener('change', render);
document.getElementById('typeFilter').addEventListener('change', render);
document.getElementById('filterSide').addEventListener('change', render);
document.getElementById('searchBox').addEventListener('input', render);
render();
</script>
</body>
</html>
